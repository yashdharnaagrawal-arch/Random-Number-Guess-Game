<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guess Number</title>

  <style>
    body{
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      background:#4f8cff;
      font-family:Arial;
    }

    .number-cal{
      background:white;
      padding:30px;
      border-radius:15px;
      text-align:center;
      width:300px;
      box-shadow:0 5px 15px rgba(0,0,0,0.2);
    }

    h2{
      margin-bottom:10px;
    }

    #guess-input{
      width:100%;
      padding:10px;
      margin:15px 0;
      border:2px solid #4f8cff;
      border-radius:8px;
      font-size:16px;
      text-align:center;
    }

    button{
      padding:10px 15px;
      border:none;
      border-radius:8px;
      color:white;
      cursor:pointer;
      margin:5px;
    }

    #submit-btn{
      background:green;
    }

    #reset-btn{
      background:red;
    }

    #result-msg{
      margin-top:15px;
      font-weight:bold;
    }
  </style>
</head>

<body>

  <div class="number-cal">
    <h2>🎯 Guess Number</h2>

    <p>Guess a number between 1 and 20</p>

    <input id="guess-input" type="number" min="1" max="20">

    <br>

    <button id="submit-btn">Guess</button>
    <button id="reset-btn">Reset</button>

    <p id="result-msg"></p>
  </div>

  <script src="./number.js"></script>

</body>
</html>
